services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: your_voice
      POSTGRES_PASSWORD: your_voice
      POSTGRES_DB: your_voice
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  self-hosted-auth:
    build:
      context: ./server/self-hosted
    env_file:
      - ./server/self-hosted/.env.example
    environment:
      DATABASE_URL: postgres://your_voice:your_voice@postgres:5432/your_voice
      APP_BASE_URL: http://localhost:4100
      WEB_APP_URL: http://localhost:3000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      - postgres
      - mailhog
    ports:
      - "4100:4100"

volumes:
  postgres-data:
